<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Inferencia bajo sospecha · ¿Quién descalibró la máquina?</title>
<style>
/* FUERA DE TOLERANCIA · estilos */
:root{
  --bg:#0e141d; --bg2:#121a26; --panel:#182231; --panel2:#1d2939;
  --line:#2b3a4f; --line2:#3a4d68;
  --ink:#e9eef5; --dim:#9db0c5; --faint:#6b7f96;
  --amber:#e8a13d; --amber2:#f4c069; --amber-dim:#8a6423;
  --teal:#63b8a5; --teal-dim:#2e5a50;
  --red:#d1705f; --red-dim:#5c332c;
  --paper:#efe6d1; --paper2:#e5d9bd; --paper-ink:#2d2517; --paper-dim:#6d6046;
  --mono:ui-monospace,"Cascadia Code","SF Mono",Consolas,"Liberation Mono",monospace;
  --serif:"Iowan Old Style","Palatino Linotype",Palatino,Georgia,serif;
  --sans:system-ui,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;
  --r:10px;
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{background:var(--bg);color:var(--ink);font-family:var(--sans);font-size:16px;line-height:1.55;
  background-image:radial-gradient(1200px 500px at 70% -10%, #17233533, transparent);}
button{font:inherit}
a{color:var(--amber2)}
.wrap{max-width:1180px;margin:0 auto;padding:18px 20px 80px}
.hide{display:none !important}

/* ---------- cabecera / cadena de custodia ---------- */
header.case{position:sticky;top:0;z-index:40;background:linear-gradient(#0e141dF2,#0e141dE6);
  backdrop-filter:blur(6px);border-bottom:1px solid var(--line)}
.case-inner{max-width:1180px;margin:0 auto;padding:10px 20px;display:flex;gap:16px;align-items:center;flex-wrap:wrap}
.brand{font-family:var(--mono);letter-spacing:.14em;font-size:13px;color:var(--dim)}
.brand b{color:var(--amber);letter-spacing:.2em}
.chain{display:flex;gap:6px;align-items:center;flex-wrap:wrap}
.tag{position:relative;font-family:var(--mono);font-size:11.5px;color:var(--faint);
  border:1px solid var(--line);border-radius:4px;padding:4px 9px 4px 16px;background:var(--bg2);white-space:nowrap}
.tag::before{content:"";position:absolute;left:6px;top:50%;transform:translateY(-50%);
  width:5px;height:5px;border-radius:50%;border:1px solid var(--faint)}
.tag.on{color:var(--ink);border-color:var(--line2)}
.tag.on::before{border-color:var(--amber)}
.tag.done{color:var(--amber2);border-color:var(--amber-dim);background:#1a1608}
.tag.done::before{background:var(--amber);border-color:var(--amber)}
.tag .sym{margin-left:6px;font-weight:700}
.tag.done .sym{display:inline-block;transform:rotate(-6deg)}
.hud{margin-left:auto;font-family:var(--mono);font-size:12.5px;color:var(--dim);display:flex;gap:14px;align-items:center}
.hud b{color:var(--ink)}
.hud .sc{color:var(--faint)}

/* ---------- tarjetas ---------- */
.panel{background:var(--panel);border:1px solid var(--line);border-radius:var(--r);padding:18px 20px;margin:16px 0}
.panel h2{margin:0 0 6px;font-size:20px}
.panel h3{margin:18px 0 8px;font-size:15px;color:var(--amber2);font-family:var(--mono);
  letter-spacing:.08em;text-transform:uppercase;font-weight:600}
.kicker{font-family:var(--mono);font-size:12px;letter-spacing:.16em;color:var(--faint);text-transform:uppercase;margin:0 0 4px}
.paper{background:linear-gradient(var(--paper),var(--paper2));color:var(--paper-ink);
  border-radius:8px;padding:18px 22px;margin:14px 0;font-family:var(--serif);font-size:17px;line-height:1.62;
  box-shadow:0 6px 18px #0007, inset 0 0 0 1px #00000014;position:relative}
.paper::before{content:"MECANIZADOS ALCOR · INVESTIGACIÓN INTERNA";position:absolute;top:-9px;left:16px;
  font-family:var(--mono);font-size:10px;letter-spacing:.18em;color:var(--paper);background:var(--amber-dim);
  padding:2px 8px;border-radius:3px}
.paper p{margin:.5em 0}
.paper .firma{font-style:italic;color:var(--paper-dim);margin-top:10px}
.recap{font-family:var(--mono);font-size:13px;color:var(--teal);border-left:3px solid var(--teal-dim);
  padding:6px 12px;margin:10px 0;background:#12261f55;border-radius:0 6px 6px 0}

/* ---------- datos / terminal ---------- */
.term{font-family:var(--mono);font-size:13.5px;background:#0a0f16;border:1px solid var(--line);
  border-radius:8px;padding:12px 14px;overflow-x:auto;white-space:pre;color:#cfe0d8;line-height:1.5}
.term .ok{color:var(--teal)} .term .warn{color:var(--amber2)} .term .p{color:#f0b9ad}
.vals{font-family:var(--mono);font-size:13px;color:var(--dim);background:var(--bg2);
  border:1px solid var(--line);border-radius:8px;padding:10px 12px;line-height:1.9;word-spacing:6px}
.vals b{color:var(--ink);font-weight:600}
table.data{border-collapse:collapse;width:100%;font-family:var(--mono);font-size:13px;margin:8px 0}
table.data th{color:var(--faint);font-weight:600;text-align:left;padding:6px 10px;border-bottom:1px solid var(--line2);
  letter-spacing:.06em;text-transform:uppercase;font-size:11px}
table.data td{padding:5px 10px;border-bottom:1px solid var(--line);color:var(--ink)}
table.data tr:last-child td{border-bottom:none}
.scroll{max-height:300px;overflow:auto;border:1px solid var(--line);border-radius:8px}
.dsbar{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin:8px 0 4px}
.dsbar .name{font-family:var(--mono);font-size:12.5px;color:var(--amber2);letter-spacing:.05em}
details.rguide{margin:10px 0;border:1px dashed var(--line2);border-radius:8px;padding:8px 12px}
details.rguide summary{cursor:pointer;font-family:var(--mono);font-size:13px;color:var(--teal)}
details.rguide pre{margin:10px 0 4px}

/* ---------- botones ---------- */
.btn{background:var(--amber);color:#1c1405;border:none;border-radius:7px;padding:9px 18px;
  font-weight:700;cursor:pointer;font-size:14.5px;letter-spacing:.02em}
.btn:hover{background:var(--amber2)}
.btn:disabled{background:#4a4232;color:#8d8368;cursor:not-allowed}
.btn.ghost{background:transparent;color:var(--dim);border:1px solid var(--line2);font-weight:600}
.btn.ghost:hover{color:var(--ink);border-color:var(--faint)}
.btn.mini{padding:5px 11px;font-size:12.5px;font-weight:600}
:focus-visible{outline:2px solid var(--amber2);outline-offset:2px;border-radius:4px}

/* ---------- pasos ---------- */
.stepdone{font-family:var(--mono);font-size:13px;color:var(--dim);margin:4px 0;padding-left:4px}
.stepdone b{color:var(--teal)}
.step{border:1px solid var(--line2);border-radius:var(--r);padding:16px 18px;margin:14px 0;background:var(--panel2)}
.step .sq{font-family:var(--mono);font-size:12px;color:var(--amber2);letter-spacing:.14em;text-transform:uppercase;margin:0 0 8px}
.step .q{font-size:16.5px;font-weight:600;margin:0 0 12px}
.opt{display:block;width:100%;text-align:left;background:var(--bg2);color:var(--ink);
  border:1px solid var(--line);border-radius:8px;padding:10px 14px;margin:7px 0;cursor:pointer;font-size:15px;line-height:1.45}
.opt:hover{border-color:var(--faint)}
.opt.sel-ok{border-color:var(--teal);background:#122620;color:var(--ink)}
.opt.sel-bad{border-color:var(--red);background:#291612;opacity:.85}
.opt:disabled{cursor:default}
.opt code{font-family:var(--mono);color:var(--amber2)}
.fb{border-radius:8px;padding:11px 14px;margin:10px 0 2px;font-size:14.5px;line-height:1.55;border:1px solid}
.fb.good{border-color:var(--teal-dim);background:#10241d;color:#cfeee4}
.fb.bad{border-color:var(--red-dim);background:#291410;color:#f3d4cc}
.fb.info{border-color:var(--line2);background:var(--bg2);color:var(--dim)}
.fb .voz{font-family:var(--mono);font-size:10.5px;letter-spacing:.16em;text-transform:uppercase;display:block;margin-bottom:4px;opacity:.75}
.pen{font-family:var(--mono);color:var(--red);font-size:12.5px}
.bonus{font-family:var(--mono);color:var(--teal);font-size:12.5px}

/* inputs numéricos y alfa */
.numgrid{display:flex;gap:14px;flex-wrap:wrap;margin:8px 0}
.numgrid label{display:flex;flex-direction:column;gap:5px;font-size:13.5px;color:var(--dim);min-width:180px}
.numgrid input{background:#0a0f16;border:1px solid var(--line2);color:var(--ink);border-radius:7px;
  padding:9px 11px;font-family:var(--mono);font-size:15px;width:180px}
.numgrid input.ok{border-color:var(--teal)} .numgrid input.bad{border-color:var(--red)}
.alpharow{display:flex;gap:10px;flex-wrap:wrap;margin:6px 0 12px}
.alpharow button{font-family:var(--mono);font-size:15px;padding:8px 16px;border-radius:7px;
  background:var(--bg2);border:1px solid var(--line2);color:var(--ink);cursor:pointer}
.alpharow button.sel{border-color:var(--amber);background:#251c08;color:var(--amber2)}
input[type=range]{accent-color:var(--amber);width:280px}
.slider-row{display:flex;align-items:center;gap:14px;flex-wrap:wrap;margin:8px 0}
.slider-row .lvl{font-family:var(--mono);font-size:20px;color:var(--amber2);min-width:64px}

/* ---------- carril lateral ---------- */
.layout{display:grid;grid-template-columns:minmax(0,1fr) 348px;gap:20px;align-items:start}
.rail{position:sticky;top:64px}
.rail .tabs{display:flex;gap:6px;margin-bottom:8px}
.rail .tabs button{flex:1;background:var(--bg2);border:1px solid var(--line);color:var(--dim);
  border-radius:7px;padding:7px 0;font-family:var(--mono);font-size:12px;letter-spacing:.08em;cursor:pointer;text-transform:uppercase}
.rail .tabs button.on{color:var(--amber2);border-color:var(--amber-dim)}
.suspect{border:1px solid var(--line);border-radius:8px;padding:10px 12px;margin:8px 0;background:var(--bg2)}
.suspect .top{display:flex;justify-content:space-between;gap:8px;align-items:baseline}
.suspect .nm{font-weight:700;font-size:14.5px}
.suspect .rol{font-size:12px;color:var(--faint)}
.badge{font-family:var(--mono);font-size:10.5px;letter-spacing:.06em;padding:2px 8px;border-radius:4px;border:1px solid;white-space:nowrap}
.badge.neu{color:var(--dim);border-color:var(--line2)}
.badge.up{color:var(--amber2);border-color:var(--amber-dim);background:#241a06}
.badge.down{color:#e8a79b;border-color:var(--red-dim);background:#241110}
.badge.front{color:var(--teal);border-color:var(--teal-dim);background:#0f211c}
.suspect ul{margin:7px 0 0;padding-left:16px;font-size:12.5px;color:var(--dim)}
.suspect li{margin:2px 0}
.suspect li .lv{font-family:var(--mono);font-size:10.5px;color:var(--faint)}
table.matrix{border-collapse:collapse;width:100%;font-family:var(--mono);font-size:11.5px}
table.matrix th{color:var(--faint);padding:5px 4px;font-weight:600;border-bottom:1px solid var(--line2)}
table.matrix td{padding:6px 4px;text-align:center;border-bottom:1px solid var(--line)}
.cell{display:inline-block;min-width:34px;padding:2px 5px;border-radius:4px;border:1px solid var(--line)}
.cell.inc{color:var(--amber2);border-color:var(--amber-dim)}
.cell.exc{color:#e8a79b;border-color:var(--red-dim)}
.cell.q{color:var(--teal);border-color:var(--teal-dim)}
.matrix-note{font-size:11.5px;color:var(--faint);margin-top:8px;font-family:var(--mono)}

/* ---------- portada ---------- */
.hero{padding:60px 0 20px;text-align:left;max-width:760px}
.hero .over{font-family:var(--mono);letter-spacing:.28em;color:var(--faint);font-size:12px;text-transform:uppercase}
.hero h1{font-family:var(--serif);font-size:clamp(40px,7vw,64px);margin:8px 0 2px;letter-spacing:.01em}
.hero h1 span{color:var(--amber)}
.hero .sub{font-family:var(--mono);color:var(--dim);font-size:14px;letter-spacing:.06em}
.setup{display:flex;gap:18px;flex-wrap:wrap;align-items:flex-end;margin:26px 0 10px}
.setup label{display:flex;flex-direction:column;gap:6px;font-size:13px;color:var(--dim)}
.setup input[type=text]{background:#0a0f16;border:1px solid var(--line2);color:var(--ink);
  border-radius:7px;padding:10px 12px;font-family:var(--mono);font-size:16px;width:230px;letter-spacing:.06em}
.modes{display:flex;gap:8px}
.modes button{background:var(--bg2);border:1px solid var(--line2);color:var(--dim);border-radius:7px;
  padding:9px 14px;cursor:pointer;font-size:13.5px}
.modes button.sel{border-color:var(--teal);color:var(--teal)}
.warnline{font-size:13px;color:var(--faint);margin-top:14px;max-width:640px}

/* informe final */
.stmt{display:flex;gap:10px;align-items:flex-start;background:var(--bg2);border:1px solid var(--line);
  border-radius:8px;padding:10px 12px;margin:7px 0;cursor:pointer}
.stmt input{margin-top:4px;accent-color:var(--amber)}
.stmt.sel{border-color:var(--amber-dim)}
.reportsel{display:flex;gap:16px;flex-wrap:wrap;margin:14px 0}
.reportsel label{display:flex;flex-direction:column;gap:6px;font-size:13px;color:var(--dim)}
.reportsel select{background:#0a0f16;color:var(--ink);border:1px solid var(--line2);border-radius:7px;
  padding:9px 11px;font-size:14.5px;min-width:260px}
.verdict{font-family:var(--serif);font-size:19px;background:linear-gradient(var(--paper),var(--paper2));
  color:var(--paper-ink);border-radius:8px;padding:18px 22px;margin:14px 0}
.scoregrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px;margin:12px 0}
.scorebox{background:var(--bg2);border:1px solid var(--line);border-radius:8px;padding:10px 12px;text-align:center}
.scorebox .v{font-family:var(--mono);font-size:22px;color:var(--amber2)}
.scorebox .l{font-size:11.5px;color:var(--faint);letter-spacing:.08em;text-transform:uppercase}
.rango{font-family:var(--mono);font-size:15px;color:var(--teal);letter-spacing:.1em}
.exporte{font-family:var(--mono);font-size:12px;background:#0a0f16;border:1px dashed var(--line2);
  border-radius:8px;padding:12px;word-break:break-all;color:var(--dim);margin:10px 0}

svg text{font-family:var(--mono)}
.chartbox{margin:10px 0}
.legend{font-family:var(--mono);font-size:11.5px;color:var(--faint);margin-top:4px}

@media (max-width:980px){
  .layout{grid-template-columns:1fr}
  .rail{position:static}
  .hud{width:100%;margin-left:0}
}
@media (prefers-reduced-motion:no-preference){
  .tag.done .sym{transition:transform .25s cubic-bezier(.2,1.6,.4,1)}
  .step{animation:rise .25s ease-out}
  @keyframes rise{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
}

.comic{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:12px;margin:14px 0}
.comicp{padding:10px}
.comicp svg{width:100%;height:auto;display:block;border-radius:8px}
.comicp .cap{font-size:12.5px;color:#9fb2c8;margin-top:7px;line-height:1.45}

/* --- muñeco reactivo --- */
#mascot{position:fixed;right:16px;bottom:12px;z-index:80;width:210px;pointer-events:none;display:flex;flex-direction:column;align-items:flex-end;gap:6px}
#mascot .mface{filter:drop-shadow(0 4px 10px rgba(0,0,0,.4));align-self:flex-end;margin-right:10px}
#mascot .mbub{max-width:210px;background:#101820;border:1px solid #3a4d68;color:#dfe7f0;font-size:12px;line-height:1.45;padding:8px 11px;border-radius:12px;text-align:left;position:relative;order:-1}
#mascot .mbub:after{content:"";position:absolute;right:24px;bottom:-6px;width:10px;height:10px;background:#101820;border-right:1px solid #3a4d68;border-bottom:1px solid #3a4d68;transform:rotate(45deg)}
#mascot.pop .mface{animation:mpop .28s ease}
@keyframes mpop{0%{transform:translateY(4px) scale(.96)}60%{transform:translateY(-2px) scale(1.04)}100%{transform:none}}
@media(max-width:900px){#mascot{display:none!important}}
/* --- selector del compás --- */
.cbrow{margin:2px 0 8px}
.cbtn{font:inherit;font-size:11.5px;padding:4px 10px;margin:0 6px 6px 0;border-radius:999px;border:1px solid #3a4d68;background:#101820;color:#9fb2c8;cursor:pointer}
.cbtn.on{border-color:#e8a13d;color:#e8a13d}
/* --- acta rica y matriz --- */
.stepdone.rich{padding:10px 12px;border-left:3px solid #2b3a4f;background:rgba(255,255,255,.02);border-radius:8px;margin-bottom:10px}
.stepdone .dsum{font-size:11px;color:#6b7f96;margin-bottom:6px}
.stepdone.rich .q{margin:.1em 0 .35em}
.ansline{display:inline-block;border:1px solid #3f6f63;color:#9fd8c9;border-radius:8px;padding:4px 9px;font-size:12.5px;margin:4px 6px 4px 0}
.matrix .rowlab{text-align:left;white-space:nowrap;font-size:11px;padding-right:6px}


/* --- identidad institucional: portada + sello de cabecera --- */
.hero-brand-logo{display:inline-flex;align-items:center;justify-content:center;background:#fff;padding:16px 22px;border-radius:16px;box-shadow:0 10px 28px rgba(0,0,0,.28);border:1px solid rgba(255,255,255,.18);margin:0 0 28px;max-width:100%}
.hero-brand-logo img{display:block;width:min(660px,100%);height:auto}
.brand-seal{font-family:var(--mono);font-size:10.5px;letter-spacing:.08em;text-transform:uppercase;color:var(--amber2);border:1px solid var(--amber-dim);background:#1a1608;border-radius:7px;padding:5px 10px;white-space:nowrap}
.final-brand-logo{display:inline-flex;background:#fff;padding:10px 14px;border-radius:12px;box-shadow:0 8px 22px rgba(0,0,0,.22);margin:0 0 14px}
.final-brand-logo img{display:block;width:min(500px,100%);height:auto}
@media(max-width:980px){.brand-seal{display:none}.hero-brand-logo{padding:12px 14px;margin-bottom:18px}.hero-brand-logo img{width:100%}.final-brand-logo img{width:100%}}

</style>
</head>
<body>
<header class="case"><div class="case-inner">
  <div class="brand">INFERENCIA BAJO <b>SOSPECHA</b></div>
  <div class="brand-seal">Cátedra Santalucía · Analytics for Education</div>
  <div id="chain" class="chain"></div>
  <div id="hud" class="hud"></div>
</div></header>

/* ---------- utilidades ---------- */
function E(tag, cls, html){const n=document.createElement(tag); if(cls)n.className=cls; if(html!=null)n.innerHTML=html; return n;}
function btn(txt, cls, fn){const b=E("button",cls||"btn",txt); b.addEventListener("click",fn); return b;}
function hashStr(s){let h=1779033703; for(let i=0;i<s.length;i++){h=Math.imul(h^s.charCodeAt(i),3432918353); h=h<<13|h>>>19;} return (h>>>0);}
function rng(seed){let a=seed>>>0; return function(){a|=0;a=a+0x6D2B79F5|0;let t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296;};}
function shuffled(arr, key){const r=rng(hashStr(ST.seed+"|"+key)); const a=arr.map((o,i)=>({o,i})); for(let i=a.length-1;i>0;i--){const k=Math.floor(r()*(i+1)); [a[i],a[k]]=[a[k],a[i]];} return a;}
function parseNum(v){if(v==null)return NaN; v=String(v).trim().replace(",","."); if(v==="")return NaN; return Number(v);}
function fmt(x){return typeof x==="number" ? String(x).replace(".",",") : x;}
async function copyText(t, b){try{await navigator.clipboard.writeText(t); flash(b,"Copiado ✓");}catch(e){const ta=E("textarea");ta.value=t;document.body.appendChild(ta);ta.select();try{document.execCommand("copy");flash(b,"Copiado ✓");}catch(_){flash(b,"No se pudo copiar");}ta.remove();}}
function flash(b,txt){const o=b.textContent;b.textContent=txt;setTimeout(()=>b.textContent=o,1400);}

function avatarSVG(av,S){
  av=av||{}; S=S||44;
  const skin=av.skin||"#eac396", hair=av.hair||"#333", shirt=av.shirt||"#5fb3a1", hs=av.hs||"short";
  let h="";
  if(hs==="bob") h='<path d="M14 32 Q13 11 32 11 Q51 11 50 32 L50 42 Q45 36 44 26 Q37 30 25 28 Q21 27 20 31 Q19 37 14 42 Z" fill="'+hair+'"/>';
  else if(hs==="short") h='<path d="M16 28 Q16 12 32 12 Q48 12 48 28 Q44 19 32 19 Q20 19 16 28 Z" fill="'+hair+'"/>';
  else if(hs==="long") h='<path d="M13 30 Q13 11 32 11 Q51 11 51 30 L51 52 L44 52 L44 29 Q40 21 32 21 Q24 21 20 29 L20 52 L13 52 Z" fill="'+hair+'"/>';
  else if(hs==="buzz") h='<path d="M17 26 Q18 13 32 13 Q46 13 47 26 Q42 19 32 19 Q22 19 17 26 Z" fill="'+hair+'" opacity=".85"/>';
  else if(hs==="bun") h='<circle cx="32" cy="10" r="6" fill="'+hair+'"/><path d="M16 28 Q16 12 32 12 Q48 12 48 28 Q44 19 32 19 Q20 19 16 28 Z" fill="'+hair+'"/>';
  else if(hs==="side") h='<path d="M16 29 Q15 12 32 12 Q49 12 48 29 Q47 17 36 17 Q24 21 16 29 Z" fill="'+hair+'"/>';
  const gafas=av.gafas?'<g stroke="#26313d" stroke-width="1.6" fill="none"><circle cx="25.5" cy="30" r="5"/><circle cx="38.5" cy="30" r="5"/><path d="M30.5 30 h3"/></g>':"";
  const barba=av.barba?'<path d="M21 34 Q23 47 32 47 Q41 47 43 34 Q41 43 32 44 Q23 43 21 34 Z" fill="'+hair+'"/>':"";
  const boca=av.barba?'' :'<path d="M27 37.5 Q32 40.5 37 37.5" stroke="#1c242e" stroke-width="1.4" fill="none" stroke-linecap="round"/>';
  const bigote=av.bigote?'<path d="M25 36.5 Q32 33.5 39 36.5 Q32 39.5 25 36.5 Z" fill="'+hair+'"/>':"";
  const aro=av.aro?'<circle cx="18.5" cy="34" r="2" fill="none" stroke="#e8b34b" stroke-width="1.4"/>':"";
  return '<svg class="avatar" width="'+S+'" height="'+S+'" viewBox="0 0 64 64" style="flex:none" aria-hidden="true">'
   +'<circle cx="32" cy="32" r="31" fill="#101820" stroke="#2a3947"/>'
   +'<path d="M12 61 Q14 46 32 46 Q50 46 52 61 Z" fill="'+shirt+'"/>'
   +'<circle cx="32" cy="30" r="13.5" fill="'+skin+'"/>'
   +h
   +'<circle cx="26.5" cy="30" r="1.5" fill="#1c242e"/><circle cx="37.5" cy="30" r="1.5" fill="#1c242e"/>'
   +barba+boca+bigote+gafas+aro+'</svg>';
}

function download(fname, text){const blob=new Blob([text],{type:"text/csv;charset=utf-8"});const u=URL.createObjectURL(blob);const a=E("a");a.href=u;a.download=fname;document.body.appendChild(a);a.click();setTimeout(()=>{URL.revokeObjectURL(u);a.remove();},400);}

/* ---------- estado ---------- */
const ST = {
  seed:"", sc:"A", mode:"r", screen:"home", pi:-1, si:0,
  score:0, max:0, phasePts:{}, pen:[], bon:[],
  evid:{}, alpha:{}, steps:null, done:[], started:false,
  reportReturned:false, report:null
};
SUS.forEach(s=>ST.evid[s]=[]);
ST.alphaVal = fid => ST.alpha[fid]!=null ? ST.alpha[fid] : 0.05;
ST.alphaLabel = fid => fmt(ST.alphaVal(fid));
const DSC = ()=>GD[ST.sc];

const CLAVE_SECRETA="alcor-2026";
function cyrb53(str,seed){let h1=0xdeadbeef^(seed||0),h2=0x41c6ce57^(seed||0);for(let i=0;i<str.length;i++){const ch=str.charCodeAt(i);h1=Math.imul(h1^ch,2654435761);h2=Math.imul(h2^ch,1597334677);}h1=Math.imul(h1^(h1>>>16),2246822507)^Math.imul(h2^(h2>>>13),3266489909);h2=Math.imul(h2^(h2>>>16),2246822507)^Math.imul(h1^(h1>>>13),3266489909);return 4294967296*(2097151&h2)+(h1>>>0);}
function scenarioFromSeed(seed){const ds=String(seed).match(/\d/g); if(!ds) return "A"; let t=0; for(const c of ds) t+=Number(c); return (t%2===0)?"A":"B";}

function addScore(pts, fid){if(!pts)return; ST.score+=pts; if(fid){ST.phasePts[fid]=(ST.phasePts[fid]||0)+pts;} renderHUD();}
function addPen(pts, why){ST.score+=pts; ST.pen.push({pts,why}); renderHUD();}
function addBon(pts, why){ST.score+=pts; ST.bon.push({pts,why}); renderHUD();}

function computeMax(){
  let m=0;
  m += C.BRIEF.classify.items.length*2;
  C.PHASES.forEach(P=>{ P.steps(ST.sc).forEach(st=>{
    if(st.type==="mcq"||st.type==="ev") m += Array.isArray(st.pts)?st.pts[0]:(st.pts||5);
    else if(st.type==="alpha") m += 5;
    else if(st.type==="num") m += st.fields.length*st.ptsEach;
    else if(st.type==="cislider") m += st.pts||5;
  });});
  m += C.REPORT.pick*7 + 15 + 5;
  ST.max = m;
}

const CHAIN = [{id:"brief",sym:"§",t:"Caso"}].concat(C.PHASES.map(P=>({id:P.id,sym:P.sym,t:"F"+P.num}))).concat([{id:"report",sym:"✎",t:"Informe"}]);
function renderChain(){
  const c=$("#chain"); c.innerHTML="";
  CHAIN.forEach(n=>{

function svgStrip(values, opts){
  const o=Object.assign({w:640,h:96,pad:34,line:null,label:""},opts||{});
  const min=Math.min(...values,o.line!=null?o.line:Infinity), max=Math.max(...values,o.line!=null?o.line:-Infinity);

  let s='<svg viewBox="0 0 '+o.w+' '+o.h+'" role="img" aria-label="'+esc(o.label)+'">';
  s+='<line x1="'+o.pad+'" y1="'+(o.h-26)+'" x2="'+(o.w-o.pad)+'" y2="'+(o.h-26)+'" stroke="#3a4d68"/>';
  values.forEach(v=>{s+='<circle cx="'+X(v)+'" cy="'+(o.h-26)+'" r="4.5" fill="#63b8a5" fill-opacity="0.75"/>';});
  if(o.line!=null){s+='<line x1="'+X(o.line)+'" y1="14" x2="'+X(o.line)+'" y2="'+(o.h-14)+'" stroke="#e8a13d" stroke-dasharray="5 4"/><text x="'+X(o.line)+'" y="12" fill="#e8a13d" font-size="11" text-anchor="middle">'+o.lineLabel+'</text>';}

/* ---------- carril: sospechosos + evidencia ---------- */
let railTab="sus";
function suspectStatus(s){
  const ev=ST.evid[s];
  if(ev.some(e=>e.dir==="exc"&&e.lvl==="F")) return ["down","Poco compatible"];
  if(ev.some(e=>e.dir==="inc"&&e.lvl==="F")) return ["up","Muy compatible"];
  const incM=ev.filter(e=>e.dir==="inc"&&e.lvl==="M").length;
  if(incM>=2) return ["up","Muy compatible"];
  if(ev.some(e=>e.dir==="inc")) return ["neu","Compatible en algo"];
  if(ev.some(e=>e.dir==="exc")) return ["down","Baja compatibilidad"];
  if(ev.some(e=>e.dir==="q")) return ["front","En duda · según el nivel"];
  return ["neu","Sin evidencia aún"];
}

  const r=$("#rail"); if(!r) return; r.innerHTML="";

  layout.appendChild(main); layout.appendChild(rail); v.appendChild(layout);

  else if(P.chart==="f5") dp.insertAdjacentHTML("beforeend", chartF5());
  else if(P.chart==="f6") dp.insertAdjacentHTML("beforeend", chartF6());
  main.appendChild(dp);
  if(ST.stepLog.length){
    const lg=E("div","panel"); lg.appendChild(E("h3",null,"Acta de la prueba · solo lectura"));

      if(typeof en==="string"){ lg.appendChild(E("div","stepdone",en)); return; }
      lg.appendChild(E("div","stepdone"+(en.h?" rich":""),(en.s?('<div class="dsum">'+en.s+"</div>"):"")+(en.h||"")));
    });
    main.appendChild(lg);
  }
  const zone=E("div"); main.appendChild(zone);
  if(ST.si < ST.stepsCache.length) renderStep(ST.stepsCache[ST.si], P, zone);

 ensure(){ if(this.el) return; const w=document.createElement("div"); w.id="mascot";

      const b=E("button","opt",o.t);

          verdict = coh>=5?o.v.good:coh>=2?o.v.mid:o.v.bad;

          mMood = coh>=5?"good":coh>=2?"think":"bad";

      box.appendChild(E("pre","term",esc(RV)+"\n(modo lectura: valores proporcionados por el sistema)"));
      addScore(total,P.id);

        } else if(tries>=2){
          addScore(earned,P.id);
          stp.fields.forEach(f=>state[f.id].inp.disabled=true);
          fb.innerHTML=fbBox("info",null,"Valores del sistema: <b>"+esc(RV)+"</b>. Compara con tu sesión de R con calma."+(earned?" <span class='bonus'>+"+earned+"</span>":""));
          MASCOT.say("think","Valores revelados: compáralos con calma.");
          ck.replaceWith(btn("Continuar","btn",()=>advance("✓ R: valores revelados <b>+"+earned+"</b>", '<pre class="term">'+esc(RV)+"</pre>")));

          ST.ret=(ST.ret||0)+1; MASCOT.say("bad","Algo no coincide: revisa tu llamada en R."); fb.innerHTML=fbBox("bad",null,"Algún valor no coincide (en rojo). Revisa tu llamada en R: te queda un intento. ¿Decimal? Acepto coma o punto.");
        }

    const els=shuffled(stp.opts,P.id+"|slider").map(({o})=>{

  }
  else if(t==="salv"){
    box.appendChild(E("p","q",stp.q));

function renderReport(v){

  p.appendChild(E("h3",null,"1 · Selecciona exactamente 5 frases para el informe"));
  const counter=E("div","legend","Seleccionadas: 0 / 5");

  });
  function selCount(){return items.filter(x=>x.cb.checked).length;}
  function sync(){const n=selCount(); counter.innerHTML="Seleccionadas: <b>"+n+" / 5</b>";
    items.forEach(x=>{ if(!x.cb.checked) x.cb.disabled = n>=5; });}
  p.appendChild(E("h3",null,"2 · Perfil señalado"));
  const selC=E("select");
  selC.appendChild(new Option("elige una opción",""));
  SUS.forEach(s=>selC.appendChild(new Option(s+" · "+NM(s)+" · "+RL(s), s)));
  selC.appendChild(new Option(C.REPORT.noOne,"none"));
  const wrap1=E("div","reportsel"); const l1=E("label",null,"Sospechoso"); l1.appendChild(selC); wrap1.appendChild(l1);
  p.appendChild(wrap1);
  p.appendChild(E("h3",null,"3 · Peso de la conclusión"));
  const selK=E("select");
  selK.appendChild(new Option("elige una opción",""));
  C.REPORT.confid.forEach((c,i)=>selK.appendChild(new Option(c.t, String(i))));
  const wrap2=E("div","reportsel"); const l2=E("label",null,"Formulación"); l2.appendChild(selK); wrap2.appendChild(l2);

    if(!selC.value||selK.value===""){fb.innerHTML=fbBox("info",null,"Falta el perfil señalado o el peso de la conclusión.");MASCOT.say("think","Falta el perfil señalado o el peso de la conclusión.");return;}

  function submit(){
    const chosen=items.filter(x=>x.cb.checked).map(x=>x.o);

    const conf=C.REPORT.confid[Number(selK.value)];
    const falls=chosen.filter(o=>o.k==="fall");
    const vet = culprit!=="none" && C.REPORT.veto[ST.sc].includes(culprit);
    const ws=(C.REPORT.wrongSoft[ST.sc]||{});
    const soft = culprit!=="none" && !!ws[culprit];
    if(!ST.reportReturned && (falls.length||vet||soft)){
      ST.reportReturned=true; addPen(-10,"Informe devuelto por la dirección");
      let msg="<p><b>La dirección devuelve el informe con anotaciones</b> <span class='pen'>−10</span>:</p><ul>";
      falls.forEach(o=>msg+="<li>"+o.fb+"</li>");
      if(vet){const e=ST.evid[culprit].find(x=>x.dir==="exc"&&x.lvl==="F");
        msg+="<li>Señala a "+esc(NM(culprit))+" pese a evidencia exculpatoria <b>fuerte</b> en su propio tablero: «"+esc(e?e.note:"exclusión fuerte")+"». Reconsidere.</li>";}
      if(soft) msg+="<li>"+ws[culprit]+"</li>";
      msg+="</ul><p>Puede corregir y reenviar <b>una vez</b>. El segundo envío será definitivo.</p>";
      fb.innerHTML=fbBox("bad","comision",msg);
      send.textContent="Reenviar (definitivo)";
      window.scrollTo({top:document.body.scrollHeight,behavior:"smooth"});
      return;
    }
    let sp=0; chosen.forEach(o=>{sp += o.k==="sound"?7:o.k==="neu"?2:-8;});
    addScore(sp,"rep");
    const cOk = culprit===DSC().culprit;
    if(cOk) addScore(15,"rep");
    else if(culprit==="none") addScore(5,"rep");
    if(conf.k==="ok") addScore(5,"rep");
    else if(conf.k==="over") addPen(-5,"Sobreconfianza en el veredicto");
    ST.report={stmts:chosen, culprit, conf, ok:cOk, falls:falls.length};
    if(!ST.done.includes("report")) ST.done.push("report");
    ST.screen="end"; render();
  }
}

/* ---------- cierre ---------- */
function renderEnd(v){
  const R=ST.report, culp=DSC().culprit;
  v.appendChild(E("div","final-brand-logo",'<img src="'+LOGO_CATEDRA+'" alt="Logo de la Cátedra Santalucía de Analytics for Education">'));
  v.appendChild(E("p","kicker","Caso cerrado · Mecanizados Alcor"));
  let vd="<p style='letter-spacing:.12em;font-size:13px'>INFORME INTERNO · FUERA DE TOLERANCIA</p>";
  vd+="<ol style='margin:8px 0 12px;padding-left:22px'>"+R.stmts.map(o=>"<li style='margin:4px 0'>"+o.t+"</li>").join("")+"</ol>";
  vd+="<p><b>Perfil señalado:</b> "+(R.culprit==="none"?C.REPORT.noOne:esc(R.culprit+" · "+NM(R.culprit)))+"</p>";
  vd+="<p><b>Peso de la conclusión:</b> "+R.conf.t+"</p>";
  vd+="<p class='firma'>Firmado: analista · códigos "+esc(ST.seed)+"</p>";
  v.appendChild(E("div","verdict",vd));
  const res=E("div","panel"); res.appendChild(E("h3",null,"Resolución del caso"));
  let ep;
  if(R.ok){ ep=C.EPILOGUE[ST.sc];
    if(R.falls>0||ST.reportReturned) ep+=" <i>(La dirección archiva, no sin subrayar las tachaduras que arrastró su informe.)</i>";
  } else if(R.culprit==="none"){
    ep="El caso queda abierto por prudencia. La dirección encarga un mes más de datos y el patrón se vuelve innegable. Recursos Humanos cita entonces al autor con los números delante y, al verlos, reconoce los hechos: <b>"+esc(NM(culp))+"</b>. Tu tablero ya lo señalaba: la convergencia estaba anotada; faltó firmarla. La cautela extrema también tiene un coste.";
  } else {
    ep="Recursos Humanos cita a "+esc(NM(R.culprit))+" con tu informe delante. Lo niega todo, y con razón: las pruebas no lo sostenían. Una revisión externa lo exculpa y el patrón completo, releído, destapa al autor real: <b>"+esc(NM(culp))+"</b>. Vuelve a tu matriz: la evidencia que lo señalaba estaba anotada, fila a fila.";
  }
  res.appendChild(E("p",null,ep));
  res.appendChild(E("p",null,"<i>Sobre tu formulación final: "+R.conf.fb+"</i>"));
  v.appendChild(res);
  const sc2=E("div","panel"); sc2.appendChild(E("h3",null,"Puntuación"));
  const grid=E("div","scoregrid");
  [["El caso","brief"],["P1","f1"],["P2","f2"],["P3","f3"],["P4","f4"],["P5","f5"],["Informe","rep"]]
    .forEach(([l,k])=>{grid.appendChild(E("div","scorebox","<div class='v'>"+(ST.phasePts[k]||0)+"</div><div class='l'>"+l+"</div>"));});
  const penT=ST.pen.reduce((a,p)=>a+p.pts,0), bonT=ST.bon.reduce((a,b)=>a+b.pts,0);
  grid.appendChild(E("div","scorebox","<div class='v' style='color:var(--red)'>"+penT+"</div><div class='l'>Penalizaciones</div>"));
  grid.appendChild(E("div","scorebox","<div class='v' style='color:var(--teal)'>+"+bonT+"</div><div class='l'>Limitaciones</div>"));
  sc2.appendChild(grid);
  const pct=Math.max(0,Math.min(1,ST.score/ST.max));
  const rank=C.RANKS.find(r=>pct>=r[0])||C.RANKS[C.RANKS.length-1];
  sc2.appendChild(E("p",null,"<b>Total: "+ST.score+" / "+ST.max+"</b> ("+Math.round(pct*100)+" %)"));
  sc2.appendChild(E("p","rango","Rango: "+rank[1]+" · "+rank[2]));
  if(ST.pen.length){ sc2.appendChild(E("h3",null,"Anotaciones de la dirección"));
    const ul=E("ul"); ST.pen.forEach(p2=>ul.appendChild(E("li",null,"<span class='pen'>"+p2.pts+"</span> · "+esc(p2.why)))); sc2.appendChild(ul);}
  if(ST.bon.length){ sc2.appendChild(E("h3",null,"Limitaciones admitidas"));
    const ul2=E("ul"); ST.bon.forEach(b=>ul2.appendChild(E("li",null,"<span class='bonus'>+"+b.pts+"</span> · "+esc(b.why)))); sc2.appendChild(ul2);}
  v.appendChild(sc2);
  const cp=E("div","panel"); cp.appendChild(E("h3",null,"Lo que has practicado"));
  const tb=E("table","data","<tr><th>Bloque</th><th>Conceptos</th></tr>"+C.CONCEPTS.map(r=>"<tr><td>"+r[0]+"</td><td>"+r[1]+"</td></tr>").join(""));
  cp.appendChild(tb); v.appendChild(cp);
  const ex=E("div","panel"); ex.appendChild(E("h3",null,"Código de resultado: entrégalo a tu profesor"));
  const payload={v:1,seed:ST.seed,sc:ST.sc,mode:ST.mode,score:ST.score,max:ST.max,
    pct:Math.round(pct*1000)/10, ph:ST.phasePts, pen:penT, bon:bonT, min:Math.round((Date.now()-(ST.t0||Date.now()))/60000), fallos:(ST.ret||0),
    culprit:R.culprit, ok:R.ok?1:0, ret:ST.reportReturned?1:0};
  const b64=btoa(unescape(encodeURIComponent(JSON.stringify(payload))));
  let chk=0; for(let i=0;i<b64.length;i++) chk=(chk+b64.charCodeAt(i))%997;
  const sig=cyrb53(b64+"|"+CLAVE_SECRETA).toString(36); const code="FT1-"+b64+"-"+chk+"-"+sig;
  ex.appendChild(E("div","exporte",esc(code)));
  const cb=E("button","btn mini","Copiar código"); cb.addEventListener("click",()=>copyText(code,cb));
  ex.appendChild(cb);
  const again=E("button","btn ghost mini","Empezar de nuevo"); again.style.marginLeft="10px";
  again.addEventListener("click",()=>location.reload());
  ex.appendChild(again);
  ex.appendChild(E("div","warnline","Copia el código <b>antes de cerrar o recargar</b>: el progreso no se guarda en el navegador."));
  v.appendChild(ex);
}

window.addEventListener("beforeunload",function(e){ if(ST.started && ST.screen!=="end"){ e.preventDefault(); e.returnValue=""; }});
if(document.readyState!=="loading") render(); else document.addEventListener("DOMContentLoaded",render);
})();

</script>
